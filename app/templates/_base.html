<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Flooring Takeoff{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center gap-4">
      <a href="/" class="flex items-center gap-3 group">
        <div class="w-9 h-9 rounded-md bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center text-white font-bold">F</div>
        <div>
          <div class="font-semibold text-slate-900 group-hover:text-emerald-700 transition">Flooring Takeoff</div>
          <div class="text-xs text-slate-500">Automated takeoff from construction PDFs</div>
        </div>
      </a>
      <div class="ml-auto text-xs text-slate-500">{% block header_right %}{% endblock %}</div>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
  <footer class="text-center text-xs text-slate-400 py-8">
    Built for the TAKEOFF-52 Lovesac Corner Shoppes flooring challenge.
  </footer>
</body>
</html>
